
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pasta Recipes – TheMealDB</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
    }
    #meals {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .meal-card {
      background: #fff;
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: left;
    }
    .meal-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .meal-content {
      padding: 12px 16px 16px;
    }
    .meal-title {
      font-size: 18px;
      margin: 0 0 6px;
      color: #2c3e50;
    }
    .meal-meta {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }
    .meal-desc {
      font-size: 13px;
      color: #444;
      max-height: 80px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <h1>🍝 Pasta Recipes (TheMealDB)</h1>
  <p>Live data from <code>https://www.themealdb.com/api/json/v1/1/search.php?s=pasta</code></p>

  <div id="meals">Loading pasta recipes...</div>

  <script>
    const apiUrl = "https://www.themealdb.com/api/json/v1/1/search.php?s=pasta";
    const mealsContainer = document.getElementById("meals");

    fetch(apiUrl)
      .then(response => response.json())
      .then(data => {
        const meals = data.meals;
        if (!meals || meals.length === 0) {
          mealsContainer.textContent = "No pasta recipes found.";
          return;
        }

        mealsContainer.innerHTML = ""; // clear loading text

        meals.forEach(meal => {
          const card = document.createElement("div");
          card.className = "meal-card";

          const img = document.createElement("img");
          img.src = meal.strMealThumb;
          img.alt = meal.strMeal;

          const content = document.createElement("div");
          content.className = "meal-content";

          const title = document.createElement("h2");
          title.className = "meal-title";
          title.textContent = meal.strMeal;

          const meta = document.createElement("div");
          meta.className = "meal-meta";
          meta.textContent = `${meal.strCategory || "Unknown category"} · ${meal.strArea || "Unknown area"}`;

          const desc = document.createElement("p");
          desc.className = "meal-desc";
          desc.textContent = (meal.strInstructions || "").slice(0, 220) + "...";

          content.appendChild(title);
          content.appendChild(meta);
          content.appendChild(desc);

          card.appendChild(img);
          card.appendChild(content);

          mealsContainer.appendChild(card);
        });
      })
      .catch(err => {
        console.error(err);
        mealsContainer.textContent = "Error loading recipes.";
      });
  </script>

</body>
</html>
