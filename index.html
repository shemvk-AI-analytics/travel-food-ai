<!DOCTYPE html>
<html>
<head>
    <title>Travel & Food AI Index</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>🌍 Travel & Food Intelligence</h1>
    <p>AI-powered insights on global travel and food trends</p>

    <div class="card">
        <h2>Top City Today</h2>
        <p id="city">Loading...</p>
    </div>

    <script>
        document.getElementById("city").innerText = "Paris - Score: 82";
    </script>

</body>
</html>
