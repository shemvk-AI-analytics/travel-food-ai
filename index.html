<!DOCTYPE html>
<html>
<head>
    <title>Travel & Food AI Index</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>🌍 Travel & Food Intelligence</h1>
    <p>AI-powered insights on global travel and food trends</p>

    <div class="card">
        <h2>City Travel Insights</h2>
        <p id="city">Loading...</p>
    </div>

    <script>
        const apiKey = "a8ff4a2cdd081a564248b837ec9d0b7c";
const city = "Paris";

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`)
  .then(response => response.json())
  .then(data => {
    const temp = data.main.temp;
    const weather = data.weather[0].description;

    document.getElementById("city").innerText =
      `${city} - ${temp}°C, ${weather}`;
  })
  .catch(error => {
    document.getElementById("city").innerText = "Error loading data";
  });
    </script>

</body>
</html>

<p style="font-size:12px; color:gray;">
Disclaimer: Travel Index are generated using a basic student level custom model based on public data and do not represent official rankings.
</p>
